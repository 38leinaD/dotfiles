# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sessionist'
#set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g default-terminal "tmux-256color"

# Push the session/window name to the outer terminal's title bar / tab.
# Without this, gnome-terminal tabs keep whatever title zsh last set
# (e.g. "_zsh_tmux_plugin_run" from oh-my-zsh's tmux plugin wrapper).
set -g set-titles on
set -g set-titles-string "#S: #W"

# Minimal status bar (no external theme)
set -g status-style "bg=#282825,fg=#dddddd"
set -g status-justify left
set -g status-left ""
set -g status-right ""
set -g status-left-length 100
set -g status-right-length 100

# Windows: number block + name block. Active number = neon yellow.
set -g window-status-format "#[bg=#c8c8c8,fg=#000000] #I #[bg=#3a3a3a,fg=#dddddd] #W "
set -g window-status-current-format "#[bg=#d7ff00,fg=#000000] #I #[bg=#4e4e4e,fg=#dddddd] #W "
set -g window-status-separator " "

set -g pane-active-border-style fg=#dddddd
set -g pane-border-style fg=#3a3a3a

# set zshell
set-option -g default-shell /bin/zsh

# Bind escape to copy mode
unbind [
bind Escape copy-mode

# p = paste
unbind p
bind p paste-buffer

# no escape delay
set -sg escape-time 250

# remap prefix to Control + x
set -g prefix C-x
unbind C-b
bind C-x send-prefix

# Start window numbering at 1 (default => 0)
set -g base-index 1
set -g pane-base-index 1

# Renumber windows after removing one
set -g renumber-windows on

# don't rename windows automatically
set-option -g allow-rename off

# Keep plenty of history for scrollback
set -g history-limit 10000

# Push yanks to the X CLIPBOARD via xclip. set-clipboard's OSC 52 path
# doesn't help under gnome-terminal (VTE blocks programmatic clipboard
# writes by default), so we pipe explicitly. Requires the tmux server to
# have DISPLAY set in its environment — confirm with `tmux show-environment`.
set -s set-clipboard on

# Use vim keybindings in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

unbind -T copy-mode-vi Space
bind -T copy-mode-vi Space send -X jump-again

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Secondary binding for C-l to retain redraw
bind C-l send-keys 'C-l'

# Easy rotating of panes
bind C-k swap-pane -U

# Dismiss current pane to background window
bind b break-pane -d
bind-key j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Keep window names as I set them
setw -g automatic-rename off

# Reload tmux.conf with prefix-r
bind C-r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# bind resizing of panes to H,J,K,L (resizes by steps of 10 lines/columns)
# # Note, bindings are repeatable (within the default 500ms time limit) so that
# # you don't have to keep entering the prefix. (Prefix-H-H-H resizes by 15)
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1
unbind -n C-Left
unbind -n C-Down
unbind -n C-Up
unbind -n C-Right
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

set -g mouse on
# Enable Shift+Up to move into scroll/copy-mode
bind -n S-Up copy-mode

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# tmux-copycat auto-detects a clipboard tool and picks wl-copy when it's
# installed, even on X11 — which silently fails. Re-bind y/Enter *after*
# tpm so our xclip-based bindings win.
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
